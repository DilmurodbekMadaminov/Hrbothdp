services:
  - type: web
    name: telegram-bot
    env: node
    buildCommand: npm install
    startCommand: npx tsx server.ts
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_USERNAME
        sync: false
      - key: ADMIN_ID
        sync: false
